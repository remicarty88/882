<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD Alpha - Trading Signals & Analysis</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i data-lucide="trending-up"></i>
                <span>GOLD ALPHA</span>
            </div>
            <nav>
                <div class="nav-item active">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Панель управления</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="activity"></i>
                    <span>Торговля</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="bar-chart-3"></i>
                    <span>Аналитика</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="settings"></i>
                    <span>Настройки</span>
            </nav>
        </aside>

        <main class="main-content">
            <header>
            <div class="pair-info">
                <h1>ЗОЛОТО / USD</h1>
                <span class="price-badge" id="current-price">0.00</span>
                <span class="change-badge" id="price-change">+0.00%</span>
            </div>
            <div class="header-actions">
                <div class="api-status-group">
                    <div class="api-status" id="history-status">
                        <span class="status-dot gray"></span>
                        <span>История</span>
                    </div>
                    <div class="api-status" id="ws-status">
                        <span class="status-dot gray"></span>
                        <span>WebSocket</span>
                    </div>
                </div>
            </div>
        </header>

        <section class="trading-grid">
            <div class="chart-container">
                <!-- TradingView Widget BEGIN -->
                <div class="tradingview-widget-container">
                    <div id="tradingview_gold"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                </div>
                <!-- TradingView Widget END -->
            </div>

            <div class="signals-panel">
                <h3>СИГНАЛЫ</h3>
                <div id="signals-list" class="signals-list">
                    <div class="signal-item loading">Ожидание данных...</div>
                </div>
            </div>

            <div class="prediction-panel">
                <h3>ПРОГНОЗ</h3>
                <div class="prediction-content">
                    <div class="prediction-main">
                        <div class="prediction-label">Сигнал</div>
                        <div class="prediction-value" id="prediction-result">ДЕРЖАТЬ</div>
                    </div>
                    <div class="prediction-details">
                        <div class="prediction-metric">
                            <span class="metric-label">Уверенность</span>
                            <span class="metric-value" id="confidence-level">--%</span>
                        </div>
                        <div class="prediction-metric">
                            <span class="metric-label">Целевая Цена</span>
                            <span class="metric-value" id="target-price">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
